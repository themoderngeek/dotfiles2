##################
# keybindings
##################

#Use control A as the tmux prefix
set-option -g prefix C-a
#Stop using Control B as the prefix
unbind C-b
#Allow Control a to be sent to underlying application with double press
bind-key C-a send-prefix

bind H previous-window
bind L next-window
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r -T prefix , resize-pane -L 20
bind -r -T prefix . resize-pane -R 20
bind -r -T prefix + resize-pane -D 7
bind -r -T prefix * resize-pane -U 7
bind : command-prompt


##################
# GLOBAL
##################

#Use vim keybindings for navigation
setw -g mode-keys vi

#Index from 1 for easier num row input
set-option -g base-index 1
set-option -g pane-base-index 1

# Trying not to use this but can be useful
set-option -g mouse on

# Store a lot of history for copy mode
set-option -g history-limit 250000

#Allow titles to be set on the terminal window
set-option -g set-titles on

#Set the terminal title
set-option -g set-titles-string "#{pane_title}"

##################
# SERVER
##################

# Tells applications running inside tmux if they have focus e.g. switching away from vim pane
set-option -s focus-events on
# Allows extended key bindins for apps running in tmux e.g. vim
set-option -s extended-keys on
# Don't listen for escape keys within tmux (this adds delays into vim)
set-option -s escape-time 0

##################
# PANE
##################

# Use the - key for vertical split and keep the current dir
bind '-' split-window -c "#{pane_current_path}"
# Use the | key for horizontal split and keep the current dir
bind '|' split-window -h -c "#{pane_current_path}"
#Stop using " for vertical split
unbind '"'
#Stop Using % for horizontal split
unbind '%'

##################
# WINDOW
##################

#Open new windows in the current dir - TEST this might be better as ~
bind c new-window -c "#{pane_current_path}"

# Update the number of the of all remaning windows when the window is closed
set-option -g renumber-windows on

##################
# STYLE
##################

## Catppuccin Mocha
ROSEWATER="#f5e0dc"
FLAMINGO="#f2cdcd"
PINK="#f5c2e7"
MAUVE="#cba6f7"
RED="#f38ba8"
MAROON="#eba0ac"
PEACH="#fab387"
YELLOW="#f9e2af"
GREEN="#a6e3a1"
TEAL="#94e2d5"
SKY="#89dceb"
SAPPHIRE="#74c7ec"
BLUE="#89b4fa"
LAVENDER="#b4befe"
TEXT="#cdd6f4"
SUBTEXT1="#bac2de"
SUBTEXT0="#a6adc8"
OVERLAY2="#9399b2"
OVERLAY1="#7f849c"
OVERLAY0="#6c7086"
SURFACE2="#585b70"
SURFACE1="#45475a"
SURFACE0="#313244"
BASE="#1e1e2e"
MANTLE="#181825"
CRUST="#11111b"

# UTF-8 Formatting of Nerd Font Glyphs 
HALF_ROUND_OPEN="#(printf '\uE0B6')"
HALF_ROUND_CLOSE="#(printf '\uE0B4')"
TRIANGLE_OPEN="#(printf '\uE0B2')"
TRIANGLE_CLOSE="#(printf '\uE0B0')"
CLOCK="#(printf '\uF017')"
TERMINAL="#(printf '\uE795')"

# Set the style of the status bar
set-option -g status-style bg=${SURFACE1},fg=${TEXT}

# Move the status bar to the top
set-option -g status-position top

# Center the window status
set-option -g status-justify left 

# Increase the max length for text on the left and right status
set-option -g status-left-length 100
set-option -g status-right-length 100

SPACER='#[bg=default] $TRIANGLE_CLOSE '

# Left Status - the session name with unicode decoration
set-option -g status-left "\
#[bg=${OVERLAY0}, fg=default]#S\
#[bg=$SURFACE1, fg=$OVERLAY0]$TRIANGLE_CLOSE\
#[bg=#{?client_prefix,red,${BLUE}}, fg=$SURFACE1]$TRIANGLE_CLOSE\
#[bg=#{?client_prefix,red,${BLUE}}, fg=$SURFACE1]$TERMINAL\
#[bg=default, fg=#{?client_prefix,red,${BLUE}}]$TRIANGLE_CLOSE\
"


# Right Status - Time and Battery with Unicode decoration
set-option -g status-right "\
#[bg=default, fg=${OVERLAY0}]$TRIANGLE_OPEN\
#[bg=${OVERLAY0}, fg=${TEAL}]#(~/.config/tmux/scripts/battery.sh)\
#[bg=default, fg=${OVERLAY0}]$TRIANGLE_OPEN\
#[bg=${OVERLAY0}, fg=${SKY}] $CLOCK %H:%M\
"



# Style the window status to list the windows and Index
set-option -g window-status-format "\
 \
#I\
#[fg=${RED}]:\
#[fg=default]#W\
 \
"

# Style the active window with Unicode decoration around the label
set-option -g window-status-current-format "\
#[bg=${GREEN}, fg=${SURFACE1}]$TRIANGLE_CLOSE\
#[bg=${GREEN}, fg=${OVERLAY0}]#I\
#[fg=${RED}]:\
#[fg=${OVERLAY0}]#W\
#[bg=default, fg=${GREEN}]$TRIANGLE_CLOSE\
"

# Remove the space between the window list as this is included in the styling above
set-option -g window-status-separator ""

#After 5 minutes of inactivity take the red pill
set-option -g lock-after-time 500
set-option -g lock-command "cmatrix -abs"


# Set the background and foreground color of the popup itself
set -g popup-style 'bg=#1e1e2e,fg=#cdd6f4' 

# Set the border color of the popup
set -g popup-border-style 'fg=#b4befe,bg=#1e1e2e'

# Set the border line type
#Options include: single, double, heavy, simple, number, or rounded
set -g popup-border-lines rounded


##################
# APPLICATIONS
##################

#Run an application in a popup and bind it to a shortcut key
bind-key D display-popup -E -w 90% -h 90% "htop"
bind-key G display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind-key T display-popup -E -d "#{pane_current_path}"
bind-key U display-popup -E "brew update && brew upgrade"

